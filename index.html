<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Energy News Daily</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
      background: #f0f4f0;
      color: #1a2e1a;
      min-height: 100vh;
    }

    header {
      background: #ffffff;
      border-bottom: 1px solid #e0ebe0;
      padding: 0 40px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 1px 8px rgba(0,0,0,0.06);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-icon {
      width: 34px;
      height: 34px;
      background: linear-gradient(135deg, #16a34a, #15803d);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      color: white;
    }

    .logo-text {
      font-size: 18px;
      font-weight: 700;
      color: #14532d;
      letter-spacing: -0.3px;
    }

    .logo-sub {
      font-size: 11px;
      color: #16a34a;
      margin-top: 1px;
      font-weight: 500;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .updated-badge {
      background: #f0fdf4;
      border: 1px solid #bbf7d0;
      color: #15803d;
      font-size: 12px;
      font-weight: 500;
      padding: 4px 12px;
      border-radius: 20px;
    }

    main {
      max-width: 1280px;
      margin: 0 auto;
      padding: 32px 24px 60px;
    }

    /* Major Events */
    .major-section {
      margin-bottom: 48px;
    }

    .section-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 18px;
    }

    .section-icon {
      font-size: 18px;
    }

    .section-title {
      font-size: 17px;
      font-weight: 700;
      color: #14532d;
    }

    .section-count {
      font-size: 12px;
      color: #6b7280;
      background: #f3f4f6;
      padding: 2px 8px;
      border-radius: 10px;
      margin-left: 4px;
    }

    .divider {
      flex: 1;
      height: 1px;
      background: linear-gradient(to right, #d1fae5, transparent);
      margin-left: 8px;
    }

    /* Major event cards */
    .major-cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 16px;
    }

    .major-card {
      background: #ffffff;
      border: 1px solid #d1fae5;
      border-left: 4px solid #16a34a;
      border-radius: 12px;
      padding: 20px;
      text-decoration: none;
      display: block;
      transition: box-shadow 0.2s, transform 0.2s;
    }

    .major-card:hover {
      box-shadow: 0 4px 20px rgba(22, 163, 74, 0.15);
      transform: translateY(-2px);
    }

    .major-card .event-label {
      font-size: 10px;
      font-weight: 700;
      color: #16a34a;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .major-card .card-title {
      font-size: 14px;
      font-weight: 600;
      color: #111827;
      line-height: 1.5;
      margin-bottom: 8px;
    }

    .major-card .card-summary {
      font-size: 12px;
      color: #6b7280;
      line-height: 1.6;
      margin-bottom: 14px;
    }

    .major-card .card-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 11px;
      color: #9ca3af;
    }

    .card-source-tag {
      background: #f0fdf4;
      color: #15803d;
      padding: 2px 8px;
      border-radius: 10px;
      font-weight: 500;
      font-size: 11px;
    }

    /* Regions grid */
    .regions {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 28px;
    }

    @media (max-width: 960px) {
      .regions { grid-template-columns: 1fr 1fr; }
    }

    @media (max-width: 640px) {
      .regions { grid-template-columns: 1fr; }
      header { padding: 0 16px; }
      main { padding: 20px 16px 40px; }
      .major-cards { grid-template-columns: 1fr; }
    }

    .news-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .news-card {
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      padding: 16px;
      text-decoration: none;
      display: block;
      transition: box-shadow 0.15s, border-color 0.15s;
    }

    .news-card:hover {
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      border-color: #d1d5db;
    }

    .news-card .card-title {
      font-size: 13px;
      font-weight: 600;
      color: #111827;
      line-height: 1.5;
      margin-bottom: 6px;
    }

    .news-card .card-summary {
      font-size: 12px;
      color: #6b7280;
      line-height: 1.5;
      margin-bottom: 10px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .news-card .card-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 11px;
    }

    .news-card .card-source {
      color: #6b7280;
      font-weight: 500;
      max-width: 60%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .news-card .card-date {
      color: #9ca3af;
    }

    /* Region badge colors */
    .badge-global { color: #2563eb; }
    .badge-sea { color: #059669; }
    .badge-china { color: #dc2626; }

    .region-header-line {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 2px solid #f3f4f6;
    }

    .region-flag {
      font-size: 20px;
    }

    .region-title {
      font-size: 15px;
      font-weight: 700;
    }

    .loading {
      text-align: center;
      padding: 100px 20px;
      color: #6b7280;
    }

    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid #e5e7eb;
      border-top-color: #16a34a;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .error {
      text-align: center;
      padding: 40px;
      color: #dc2626;
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 10px;
      font-size: 13px;
    }

    .empty {
      color: #9ca3af;
      font-size: 13px;
      padding: 24px;
      text-align: center;
      background: #f9fafb;
      border: 1px dashed #e5e7eb;
      border-radius: 10px;
    }

    .read-more {
      color: #16a34a;
      font-size: 11px;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">
      <div class="logo-icon">⚡</div>
      <div>
        <div class="logo-text">Energy News Daily</div>
        <div class="logo-sub">Global · Southeast Asia · China</div>
      </div>
    </div>
    <div class="header-right">
      <div class="updated-badge">Updated: <span id="updated-time">—</span></div>
    </div>
  </header>

  <main>
    <div id="app">
      <div class="loading">
        <div class="spinner"></div>
        Loading today's news...
      </div>
    </div>
  </main>

  <script>
    function renderMajorCard(item) {
      return `
        <a class="major-card" href="${item.link}" target="_blank" rel="noopener">
          <div class="event-label">⚡ Major Event</div>
          <div class="card-title">${item.title}</div>
          ${item.summary ? `<div class="card-summary">${item.summary}</div>` : ""}
          <div class="card-meta">
            <span class="card-source-tag">${item.source || "News"}</span>
            <span>${item.published || ""}</span>
          </div>
        </a>
      `;
    }

    function renderNewsCard(item) {
      return `
        <a class="news-card" href="${item.link}" target="_blank" rel="noopener">
          <div class="card-title">${item.title}</div>
          ${item.summary ? `<div class="card-summary">${item.summary}</div>` : ""}
          <div class="card-meta">
            <span class="card-source">${item.source || ""}</span>
            <span class="card-date">${item.published || ""}</span>
          </div>
        </a>
      `;
    }

    const REGIONS = [
      { key: "global",       flag: "🌍", title: "Global",        cls: "badge-global" },
      { key: "southeast_asia", flag: "🌏", title: "Southeast Asia", cls: "badge-sea" },
      { key: "china",        flag: "🇨🇳", title: "China",         cls: "badge-china" },
    ];

    function renderApp(data) {
      document.getElementById("updated-time").textContent = data.updated || "—";
      const sections = data.sections || {};
      let html = "";

      // Major Events
      const major = sections.major_events || [];
      html += `
        <div class="major-section">
          <div class="section-header">
            <span class="section-icon">🔥</span>
            <span class="section-title">Global Highlights Worth Watching</span>
            <span class="section-count">${major.length}</span>
            <div class="divider"></div>
          </div>
          <div class="major-cards">
            ${major.length ? major.map(renderMajorCard).join("") : '<div class="empty">No major events this week</div>'}
          </div>
        </div>
      `;

      // Regional news
      html += '<div class="regions">';
      for (const r of REGIONS) {
        const items = sections[r.key] || [];
        html += `
          <div>
            <div class="region-header-line">
              <span class="region-flag">${r.flag}</span>
              <span class="region-title ${r.cls}">${r.title}</span>
              <span class="section-count">${items.length}</span>
            </div>
            <div class="news-list">
              ${items.length ? items.map(renderNewsCard).join("") : '<div class="empty">No news this week</div>'}
            </div>
          </div>
        `;
      }
      html += "</div>";

      document.getElementById("app").innerHTML = html;
    }

    async function loadNews() {
      try {
        const res = await fetch("data/news.json?t=" + Date.now());
        if (!res.ok) throw new Error("Failed to load");
        const data = await res.json();
        renderApp(data);
      } catch (err) {
        document.getElementById("app").innerHTML = `
          <div class="error">Could not load news. Please try again later.</div>
        `;
      }
    }

    loadNews();
  </script>
</body>
</html>
