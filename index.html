<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Energy News Daily</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
    }

    header {
      background: linear-gradient(135deg, #0d1f0d 0%, #0f2a1a 100%);
      border-bottom: 1px solid #1e3a2a;
      padding: 20px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, #22c55e, #16a34a);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .logo-text {
      font-size: 20px;
      font-weight: 700;
      color: #f0fdf4;
      letter-spacing: -0.3px;
    }

    .logo-sub {
      font-size: 12px;
      color: #4ade80;
      margin-top: 1px;
    }

    .updated {
      font-size: 12px;
      color: #6b7280;
    }

    .updated span {
      color: #4ade80;
    }

    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 32px 24px;
    }

    /* Major Events banner */
    .major-section {
      margin-bottom: 40px;
    }

    .section-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }

    .section-badge {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      padding: 3px 10px;
      border-radius: 20px;
    }

    .badge-major { background: #7c2d12; color: #fb923c; }
    .badge-global { background: #1e3a5f; color: #60a5fa; }
    .badge-sea { background: #1a3a2a; color: #34d399; }
    .badge-china { background: #3b1f1f; color: #f87171; }

    .section-title {
      font-size: 18px;
      font-weight: 600;
      color: #f1f5f9;
    }

    .section-count {
      font-size: 12px;
      color: #6b7280;
      margin-left: auto;
    }

    /* Major event cards - horizontal scroll */
    .major-cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 16px;
    }

    .major-card {
      background: linear-gradient(135deg, #1c1a0e, #231f0a);
      border: 1px solid #3d3510;
      border-radius: 12px;
      padding: 20px;
      cursor: pointer;
      transition: border-color 0.2s, transform 0.2s;
      text-decoration: none;
      display: block;
    }

    .major-card:hover {
      border-color: #f59e0b;
      transform: translateY(-2px);
    }

    .major-card .event-tag {
      font-size: 10px;
      font-weight: 700;
      color: #f59e0b;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 8px;
    }

    .major-card .card-title {
      font-size: 15px;
      font-weight: 600;
      color: #fef3c7;
      line-height: 1.4;
      margin-bottom: 10px;
    }

    .major-card .card-summary {
      font-size: 13px;
      color: #9ca3af;
      line-height: 1.5;
      margin-bottom: 12px;
    }

    .major-card .card-meta {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: #6b7280;
    }

    /* Regular news grid */
    .regions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 32px;
    }

    @media (max-width: 768px) {
      .regions { grid-template-columns: 1fr; }
      header { padding: 16px 20px; }
      main { padding: 20px 16px; }
    }

    .region-section {}

    .news-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .news-card {
      background: #161b22;
      border: 1px solid #21262d;
      border-radius: 10px;
      padding: 16px;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      text-decoration: none;
      display: block;
    }

    .news-card:hover {
      border-color: #30363d;
      background: #1c2128;
    }

    .news-card .card-title {
      font-size: 14px;
      font-weight: 600;
      color: #e6edf3;
      line-height: 1.4;
      margin-bottom: 8px;
    }

    .news-card .card-summary {
      font-size: 12px;
      color: #7d8590;
      line-height: 1.5;
      margin-bottom: 10px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .news-card .card-meta {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: #6b7280;
    }

    .card-source {
      font-weight: 500;
      color: #8b949e;
      max-width: 60%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .loading {
      text-align: center;
      padding: 80px 20px;
      color: #6b7280;
      font-size: 14px;
    }

    .loading .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid #21262d;
      border-top-color: #22c55e;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .error {
      text-align: center;
      padding: 40px;
      color: #f87171;
      font-size: 13px;
      background: #1c1010;
      border: 1px solid #3b1f1f;
      border-radius: 10px;
    }

    .empty {
      color: #6b7280;
      font-size: 13px;
      padding: 20px;
      text-align: center;
      background: #161b22;
      border: 1px dashed #21262d;
      border-radius: 10px;
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">
      <div class="logo-icon">⚡</div>
      <div>
        <div class="logo-text">Energy News Daily</div>
        <div class="logo-sub">Global · Southeast Asia · China</div>
      </div>
    </div>
    <div class="updated">Last updated: <span id="updated-time">loading...</span></div>
  </header>

  <main>
    <div id="app">
      <div class="loading">
        <div class="spinner"></div>
        Loading today's news...
      </div>
    </div>
  </main>

  <script>
    const SECTION_META = {
      major_events: {
        label: "Major Events",
        badgeClass: "badge-major",
        title: "Global Highlights Worth Watching",
        isMajor: true,
      },
      global: {
        label: "Global",
        badgeClass: "badge-global",
        title: "Global Renewable Energy",
        isMajor: false,
      },
      southeast_asia: {
        label: "Southeast Asia",
        badgeClass: "badge-sea",
        title: "Southeast Asia",
        isMajor: false,
      },
      china: {
        label: "China",
        badgeClass: "badge-china",
        title: "China New Energy",
        isMajor: false,
      },
    };

    function renderMajorCard(item) {
      return `
        <a class="major-card" href="${item.link}" target="_blank" rel="noopener">
          <div class="event-tag">⚡ Major Event · ${item.source}</div>
          <div class="card-title">${item.title}</div>
          ${item.summary ? `<div class="card-summary">${item.summary}</div>` : ""}
          <div class="card-meta">
            <span>${item.published || ""}</span>
            <span>Read →</span>
          </div>
        </a>
      `;
    }

    function renderNewsCard(item) {
      return `
        <a class="news-card" href="${item.link}" target="_blank" rel="noopener">
          <div class="card-title">${item.title}</div>
          ${item.summary ? `<div class="card-summary">${item.summary}</div>` : ""}
          <div class="card-meta">
            <span class="card-source">${item.source}</span>
            <span>${item.published || ""}</span>
          </div>
        </a>
      `;
    }

    function renderApp(data) {
      document.getElementById("updated-time").textContent = data.updated || "—";

      const sections = data.sections || {};
      let html = "";

      // Major Events section
      const majorItems = sections.major_events || [];
      html += `
        <div class="major-section">
          <div class="section-header">
            <span class="section-badge badge-major">Major Events</span>
            <span class="section-title">Global Highlights Worth Watching</span>
            <span class="section-count">${majorItems.length} stories</span>
          </div>
          <div class="major-cards">
            ${majorItems.length
              ? majorItems.map(renderMajorCard).join("")
              : '<div class="empty">No major events today</div>'}
          </div>
        </div>
      `;

      // Regional sections
      const regionOrder = ["global", "southeast_asia", "china"];
      html += '<div class="regions">';
      for (const key of regionOrder) {
        const meta = SECTION_META[key];
        const items = sections[key] || [];
        html += `
          <div class="region-section">
            <div class="section-header">
              <span class="section-badge ${meta.badgeClass}">${meta.label}</span>
              <span class="section-title">${meta.title}</span>
              <span class="section-count">${items.length} stories</span>
            </div>
            <div class="news-list">
              ${items.length
                ? items.map(renderNewsCard).join("")
                : '<div class="empty">No news today</div>'}
            </div>
          </div>
        `;
      }
      html += "</div>";

      document.getElementById("app").innerHTML = html;
    }

    async function loadNews() {
      try {
        const res = await fetch("data/news.json?t=" + Date.now());
        if (!res.ok) throw new Error("Failed to load news data");
        const data = await res.json();
        renderApp(data);
      } catch (err) {
        document.getElementById("app").innerHTML = `
          <div class="error">
            Could not load news data.<br/>
            The daily job may not have run yet — try again later or trigger it manually in GitHub Actions.
          </div>
        `;
      }
    }

    loadNews();
  </script>
</body>
</html>
